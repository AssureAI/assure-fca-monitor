<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Users</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
  body{ margin:0; background:#0F172A; color:#E2E8F0; font-family:Inter,ui-sans-serif,system-ui,sans-serif; }
  header{ display:flex; justify-content:space-between; align-items:center; padding:18px 34px; border-bottom:1px solid #1E293B; }
  .logo-row{ display:flex; align-items:center; gap:14px; }
  .logo-row span{ font-size:18px; color:#94A3B8; }
  .top-actions{ display:flex; gap:14px; align-items:center; }
  .link{ color:#94A3B8; text-decoration:none; font-size:14px; }
  .link:hover{ text-decoration:underline; }
  .container{ max-width:900px; margin:30px auto; padding:0 18px; }
</style>
</head>
<body>
<header>
  <div class="logo-row">
    <img src="/static/logo-dark.svg" width="160" alt="RuleGrid"/>
    <span>Users</span>
  </div>
  <div class="top-actions">
    <a class="link" href="/checker">New check</a>
    {% if user_role == "admin" %}<a class="link" href="/admin/mi">MI</a>{% endif %}
    <a class="link" href="/admin/runs">Run history</a>
    {% if user_role == "admin" %}<a class="link" href="/admin/users">Users</a>{% endif %}
    <a class="link" href="/logout">Logout</a>
  </div>
</header>
<div class="container">
<h2>Firm Users</h2>

{% if error %}
  <div style="color:#dc2626;margin-bottom:12px;">
    {{ error }}
  </div>
{% endif %}

{% if success %}
  <div style="color:#16a34a;margin-bottom:12px;">
    {{ success }}
  </div>
{% endif %}

<form method="post" action="/admin/users/create">
  <input name="email" type="email" placeholder="Email" required/>
  <input name="password" type="password" placeholder="Temporary password" required/>
  <select name="role">
    <option value="member">Member</option>
    <option value="admin">Admin</option>
  </select>
  <button type="submit">Create user</button>
</form>

<hr/>

<ul>
  {% for u in users %}
    <li>{{ u.email }} — {{ u.role }}</li>
  {% endfor %}
</ul>

</div>
</body>
</html>
